<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rune — 57-Skill Mesh Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e17;
    color: #e2e8f0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .canvas {
    position: relative;
    width: 1200px;
    height: 900px;
  }

  svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* Glow filters */
  .glow-l0 { filter: drop-shadow(0 0 8px #f59e0b); }
  .glow-l1 { filter: drop-shadow(0 0 6px #ef4444); }
  .glow-l2 { filter: drop-shadow(0 0 5px #6366f1); }
  .glow-l3 { filter: drop-shadow(0 0 4px #10b981); }
  .glow-l4 { filter: drop-shadow(0 0 3px #06b6d4); }

  /* Connection animations */
  @keyframes pulse-connection {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.6; }
  }

  @keyframes flow-dash {
    to { stroke-dashoffset: -20; }
  }

  @keyframes node-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .connection {
    animation: pulse-connection 3s ease-in-out infinite;
  }

  .connection-flow {
    stroke-dasharray: 8 12;
    animation: flow-dash 1.5s linear infinite;
  }

  .node-group {
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .node-group:hover {
    transform: scale(1.15);
  }

  /* Legend */
  .legend {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 32px;
    font-size: 13px;
    font-weight: 500;
    animation: fade-in-up 1s ease 0.5s both;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  /* Title */
  .title {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    animation: fade-in-up 1s ease both;
  }

  .title h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #f8fafc;
    letter-spacing: -0.5px;
  }

  .title p {
    font-size: 14px;
    color: #64748b;
    margin-top: 4px;
  }

  /* Stats */
  .stats {
    position: absolute;
    top: 24px;
    right: 30px;
    text-align: right;
    animation: fade-in-up 1s ease 0.3s both;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: #f59e0b;
  }

  .stat-label {
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
</style>
</head>
