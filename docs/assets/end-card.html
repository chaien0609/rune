<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rune — End Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #0a0e17;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 1280px;
    height: 720px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }

  /* Background effects */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  .bg-glow-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(99,102,241,0.1) 0%, transparent 70%);
    z-index: 0;
  }

  /* Logo */
  .logo-section {
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 1;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #ef4444 0%, #6366f1 100%);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(99,102,241,0.3);
  }

  .logo-icon span {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: white;
  }

  .logo-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: #f8fafc;
    letter-spacing: -1px;
  }

  /* Tagline */
  .tagline {
    font-size: 20px;
    color: #94a3b8;
    font-weight: 500;
    letter-spacing: 0.5px;
    z-index: 1;
    margin-top: -16px;
  }

  /* Install commands */
  .commands {
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 1;
    margin-top: 8px;
  }

  .command-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .platform-label {
    width: 110px;
    text-align: right;
    font-size: 13px;
    color: #64748b;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .command-box {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: #e6edf3;
    font-weight: 500;
    min-width: 480px;
  }

  .command-box .highlight {
    color: #79c0ff;
  }

  .command-box .package {
    color: #ffa657;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 48px;
    z-index: 1;
    margin-top: 12px;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: #f59e0b;
  }

  .stat-label {
    font-size: 12px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* GitHub link */
  .github-link {
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #94a3b8;
    font-size: 16px;
    font-weight: 500;
    margin-top: 8px;
  }

  .github-link svg {
    width: 20px;
    height: 20px;
    fill: #94a3b8;
  }

  /* License badge */
  .license {
    position: absolute;
    bottom: 32px;
    right: 40px;
    z-index: 1;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.2);
    color: #6ee7b7;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
  }

  /* Subtle animation */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  .logo-section {
    animation: float 4s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="card">
  <div class="bg-grid"></div>
  <div class="bg-glow-center"></div>

  <!-- Logo -->
  <div class="logo-section">
    <div class="logo-icon"><span>R</span></div>
    <span class="logo-name">Rune</span>
  </div>

  <!-- Tagline -->
  <div class="tagline">Less skills. Deeper connections.</div>

  <!-- Install commands -->
  <div class="commands">
    <div class="command-row">
      <span class="platform-label">Claude Code</span>
      <div class="command-box">
        <span class="highlight">claude plugin install</span> <span class="package">rune-kit/rune</span>
      </div>
    </div>
    <div class="command-row">
      <span class="platform-label">Any IDE</span>
      <div class="command-box">
        <span class="highlight">npx --yes @rune-kit/rune</span> <span class="package">init</span>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-value">57</div>
      <div class="stat-label">Skills</div>
    </div>
    <div class="stat">
      <div class="stat-value">200+</div>
      <div class="stat-label">Connections</div>
    </div>
    <div class="stat">
      <div class="stat-value">5</div>
      <div class="stat-label">Layers</div>
    </div>
    <div class="stat">
      <div class="stat-value">13</div>
      <div class="stat-label">Extensions</div>
    </div>
  </div>

  <!-- GitHub -->
  <div class="github-link">
    <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    github.com/rune-kit/rune
  </div>

  <div class="license">MIT License &bull; Free Forever</div>
</div>

</body>
</html>
